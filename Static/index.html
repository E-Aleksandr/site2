<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 ТЕСТ Telegram Auth</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #e8f0fe;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .auth-box {
            background: #f8fafd;
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 20px;
        }
        .info-box {
            background: #f0f4f9;
            border-radius: 24px;
            padding: 20px;
            text-align: left;
            font-family: monospace;
            margin-top: 20px;
        }
        .hidden {
            display: none;
        }
        button {
            background: #2a9d8f;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .info-row {
            margin: 10px 0;
            border-bottom: 1px solid #ddd;
            padding: 5px 0;
        }
        .label {
            font-weight: bold;
            display: inline-block;
            width: 100px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📋 ТЕСТ Telegram Auth</h1>
    <div class="sub">Авторизуйтесь, чтобы увидеть свои данные</div>

    <!-- Блок с кнопкой входа -->
    <div id="loginSection" class="auth-box">
        <div id="telegramWidget"></div>
        <div class="info-box">
            ⚡ Нажмите на кнопку выше, чтобы войти через Telegram
        </div>
    </div>

    <!-- Блок с данными пользователя (скрыт изначально) -->
    <div id="userSection" class="hidden">
        <div class="info-box">
            <h3>👤 ДАННЫЕ ПОЛЬЗОВАТЕЛЯ</h3>
            <div class="info-row"><span class="label">🆔 User ID:</span> <span id="userId">—</span></div>
            <div class="info-row"><span class="label">👤 Username:</span> <span id="username">—</span></div>
            <div class="info-row"><span class="label">📛 First Name:</span> <span id="firstName">—</span></div>
            <div class="info-row"><span class="label">🔑 Hash:</span> <span id="hashPreview">—</span></div>
        </div>
        <button id="logoutBtn">🚪 Выйти</button>
    </div>
</div>

<script>
    // ЗАМЕНИТЕ НА ИМЯ ВАШЕГО БОТА (без @)
    const BOT_USERNAME = "TKTTestGame_bot";
    
    // Функция, которую вызовет виджет после авторизации
    window.onTelegramAuth = function(user) {
        console.log("Авторизация успешна:", user);
        
        // Заполняем данные
        document.getElementById("userId").innerText = user.id;
        document.getElementById("username").innerText = user.username || "(нет)";
        document.getElementById("firstName").innerText = user.first_name || "—";
        document.getElementById("hashPreview").innerText = user.hash.substring(0, 20) + "...";
        
        // Показываем блок с данными, скрываем кнопку входа
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("userSection").classList.remove("hidden");
        
        // Сохраняем в sessionStorage
        sessionStorage.setItem("tg_user", JSON.stringify(user));
    };
    
    // Проверяем, есть ли сохранённый пользователь
    function checkSavedUser() {
        const saved = sessionStorage.getItem("tg_user");
        if (saved) {
            try {
                const user = JSON.parse(saved);
                if (user && user.id) {
                    window.onTelegramAuth(user);
                }
            } catch(e) {}
        }
    }
    
    // Загружаем виджет
    function loadWidget() {
        const container = document.getElementById("telegramWidget");
        if (!container) return;
        
        // Очищаем контейнер
        container.innerHTML = "";
        
        // Создаём скрипт виджета
        const script = document.createElement('script');
        script.src = "https://telegram.org/js/telegram-widget.js?22";
        script.setAttribute('data-telegram-login', BOT_USERNAME);
        script.setAttribute('data-size', "large");
        script.setAttribute('data-onauth', "onTelegramAuth(user)");
        script.setAttribute('data-request-access', "write");
        container.appendChild(script);
    }
    
    // Выход
    document.getElementById("logoutBtn")?.addEventListener("click", function() {
        sessionStorage.removeItem("tg_user");
        document.getElementById("loginSection").classList.remove("hidden");
        document.getElementById("userSection").classList.add("hidden");
        loadWidget(); // Перезагружаем кнопку
    });
    
    // Запуск
    checkSavedUser();
    if (!sessionStorage.getItem("tg_user")) {
        loadWidget();
    }
</script>
</body>
</html>
